version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    # Exposing port to host is removed since NGINX routes traffic internally now
    expose:
      - '3000'
    deploy:
      replicas: 3 # Scale the Next.js API instances behind the NGINX load balancer
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/voiceforge
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Add other API keys here
    depends_on:
      - db
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder # Use the builder target so tsx and src files are available
    command: npx tsx src/workers/campaign-worker.ts
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/voiceforge
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Add other API keys here
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=voiceforge
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
